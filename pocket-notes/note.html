<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script defer src="./util.js"></script>

    <script defer src="./note.js"></script>
  </head>

  <body>
    <header class="header-container">
      <span class="logo-container">
        <a href="./index.html"> <i class="fa-solid fa-arrow-left"></i></a>
        <p class="header-title">Pocket Notes</p>
      </span>

      <span class="header-btn-container">
        <button class="delete-all-btn">DELETE</button>
        <button class="new-btn">Edit</button>
      </span>
    </header>

    <main class="wrapper">
      <section class="note-description-container">
        <span class="note-description-title">
          <span class="color"></span>
          <span>
            <p class="heading"></p>
            <p class="notes-createdAt"></p>
          </span>
        </span>
        <figure class="note-cover-img">
          <!-- <img src="" alt="cover_img" /> -->
        </figure>
        <p class="note-description"></p>
      </section>
      <section class="new-modal-wrapper">
        <aside class="new-modal">
          <section class="top-section">
            <div class="toast">
              <p class="toast-title">EDIT NOTE</p>
              <span class="new-modal-toast-close"
                ><i class="fa-solid fa-xmark"></i
              ></span>
            </div>
            <section class="modal-inputs">
              <input type="text" name="title" placeholder="Notes Title" class="title" />
              <input type="text" name="image" placeholder="Add Image URL" class="imageUrl" />
              <textarea
                placeholder="Add content here"
                class="content"
                name="content"
              ></textarea>
            </section>
          </section>

          <section class="bottom-section">
            <section class="background-colors">
              <span class="color bubblegum-crisis">
                <i class="fa-solid fa-check tick"></i>
              </span>
              <span class="color emptiness">
                <i class="fa-solid fa-check tick"></i>
              </span>
              <span class="color banana-bread">
                <i class="fa-solid fa-check tick"></i>
              </span>
              <span class="color pineapple-perfume">
                <i class="fa-solid fa-check tick"></i>
              </span>
              <span class="color peach-fizz">
                <i class="fa-solid fa-check tick"></i>
              </span>
            </section>

            <button class="modal-add-btn">Edit</button>
          </section>
        </aside>
      </section>
      <section class="unsaved modal-wrapper">
        <section class="modal">
          <div class="toast">
            <p class="toast-title">Confirm</p>
            <span class="toast-close"><i class="fa-solid fa-xmark"></i></span>
          </div>
          <p class="modal-message">
            Seems like you are in the middle of adding/editing content. Do you
            want to leave?
          </p>
          <button class="modal-btn">YES, CLOSE</button>
        </section>
      </section>
      <section class="delete modal-wrapper">
        <section class="modal">
          <div class="toast">
            <p class="toast-title">Confirm Delete</p>
            <span class="modal-toast-close"
              ><i class="fa-solid fa-xmark"></i
            ></span>
          </div>
          <p class="modal-message">
            Are you sure you want to delete this note?
          </p>
          <button class="modal-btn">YES, DELETE</button>
        </section>
      </section>
    </main>
  </body>
</html>
