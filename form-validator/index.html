<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <title>Form Validator</title>
  </head>
  <body>
    <!-- start  -->
    <main class="wrapper">
      <figure class="logo-container">
        <img
          src="./assets/Sirius_CDW_Cobranded_PMS2747.svg"
          alt="sirius icon"
        />
      </figure>
      <!-- form  -->
      <form class="form">
        <!-- billing section  -->
        <section class="section">
          <h2 class="heading">BILLING DETAILS</h2>
          <div class="input-wrapper">
            <div class="input-container">
              <label for="firstName" class="label">First Name</label>
              <input type="text" name="firstName" class="input-field" />
              <p class="error"></p>
            </div>
            <div class="input-container">
              <label for="lastName" class="label">Last Name</label>
              <input type="text" name="lastName" class="input-field" />
              <p class="error"></p>
            </div>
          </div>
          <div class="input-container">
            <label for="email" class="label">Email Address</label>
            <input type="text" name="email" class="input-field" />
            <p class="error"></p>
          </div>
          <div class="input-container">
            <label for="contactNumber" class="label">Contact Number</label>
            <input type="text" name="contactNumber" class="input-field" />
            <p class="error"></p>
          </div>
          <div class="input-container">
            <label for="pinCode" class="label">PIN Code</label>
            <input type="text" name="pinCode" class="input-field" />
            <p class="error"></p>
          </div>
        </section>
        <!-- payment section  -->
        <section class="section">
          <h2 class="heading">PAYMENT DETAILS</h2>
          <div class="input-container">
            <label for="cardNumber" class="label">Card Number</label>
            <input type="text" name="cardNumber" class="input-field" />
            <p class="error"></p>
          </div>
          <div class="input-wrapper">
            <div class="input-container">
              <label for="cardExpiry" class="label">Card Expiry (Year)</label>
              <input type="text" name="cardExpiry" class="input-field" />
              <p class="error"></p>
            </div>
            <div class="input-container">
              <label for="cvv" class="label">CVV</label>
              <input type="text" name="cvv" class="input-field" />
              <p class="error"></p>
            </div>
          </div>
          <button class="complete-btn" type="submit">COMPLETE PAYMENT</button>
        </section>
        <!-- end  -->
      </form>
    </main>
  </body>
</html>
