<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <title>Math Kids</title>
  </head>
  <body>
    <header class="header-container">
      <h3>MATH KIDS</h3>
      <h3>KIDS LEARNING APP</h3>
    </header>
    <!-- wrapper starts  -->
    <main class="wrapper">
      <!-- section one starts  -->
      <section class="section one">
        <p class="section-title">1.Choose a Shape</p>
        <div class="shapes">
          <span class="circle"></span>
          <span class="triangle"></span>
          <span class="square"></span>
        </div>
        <button class="section-one-btn">NEXT</button>
      </section>
      <!-- section one ends  -->

      <!-- section two starts  -->
      <section class="section two">
        <p class="section-title">2.Enter</p>
        <input type="number" class="input-field" />
        <button class="section-two-btn">CALCULATE</button>
      </section>
      <!-- section two ends  -->

      <!-- section three starts  -->
      <section class="section three">
        <span class="square"></span>
        <section class="measurements">
          <p class="section-title">Square</p>
          <article class="measurement">
            <span class="left-side">SIDE </span>
            <span class="middle">S</span>
            <span class="right-side">5 cm</span>
          </article>
          <article class="measurement">
            <span class="left-side">AREA </span>
            <span class="middle">S * S</span>
            <span class="right-side">25 sq cm</span>
          </article>
          <article class="measurement">
            <span class="left-side">PERIMETER </span>
            <span class="middle">4 * S</span>
            <span class="right-side">20 cm</span>
          </article>
        </section>
        <button class="section-three-btn">START AGAIN</button>
      </section>
      <!-- section three ends -->
    </main>
    <!-- wrapper ends  -->
  </body>
</html>
