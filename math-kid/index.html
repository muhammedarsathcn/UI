<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>
    <title>Math Kids</title>
  </head>
  <body>
    <header class="header-container">
      <h3 class="logo">MATH KIDS</h3>
      <h3 class="platform">KIDS LEARNING APP</h3>
    </header>
    <!-- wrapper starts  -->
    <main class="wrapper">
      <!-- section one starts  -->
      <section class="section one" id="step1">
        <p class="section-title">1.Choose a Shape</p>
        <div class="shapes">
            
        </div>
        <button class="section-one-btn">NEXT</button>
      </section>
      <!-- section one ends  -->

      <!-- section two starts  -->
      <form class="section two" id="step2">
        <p class="section-title"></p>
        <input type="text" class="input-field" name="calculate-input" autocomplete="off" />
        <button class="section-two-btn" type="submit
        
        ">CALCULATE</button>
      </form>
      <!-- section two ends  -->

      <!-- section three starts  -->
      <section class="section three" id="step3">
        <span class="section-shape"></span>
        <section class="measurements">
          <p class="section-title"></p>
          <section class="measurement" id="side">
            <div class="left-side" id="side">SIDE </div>
            <div class="middle">S</div>
            <div class="right-side"></div>
          </section>
          <section class="measurement" id="area">
            <div class="left-side">AREA </div>
            <div class="middle"></div>
            <div class="right-side"></div>
          </section>
          <section class="measurement" id="perimeter">
            <div class="left-side">PERIMETER </div>
            <div class="middle"></div>
            <div class="right-side"></div>
          </section>
        </section>
        <button class="section-three-btn">START AGAIN</button>
      </section>
      <!-- section three ends -->
    </main>
    <!-- wrapper ends  -->
  </body>
</html>
