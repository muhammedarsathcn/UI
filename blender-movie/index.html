<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blender Movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" />
    <script defer type="module" src="./script.js"></script>
  </head>
  <body>
    <!-- header starts  -->
    <header class="header-container">
      <p class="header-title">Blender Movies</p>
      <span class="profile-container">
        <p class="profile-name">Steffy Jerry</p>
        <figure class="profile-img-container">
          <img src="./images/profile.png" alt="Steffy_Jerry" />
        </figure>
      </span>
    </header>
    <!-- header ends  -->
    <main class="container">
      <section class="movie">
        <span class="circle">
          <i class="fa-solid fa-play"></i>
        </span>
        <video
        controls
          class="video-container"
          poster="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRfZRwBm1p7ugENWtIBvaZIj9B4Y9x84ccqbg&s"
        >
          <source src="" />
        </video>
        <p class="movie-title"></p>
        <p class="movie-description"></p>

        <section class="comments">
          <p class="comments-title">Comments</p>
        </section>
      </section>

      <section class="posters">
        <p class="posters-title">Upcoming Projects</p>
      </section>
    </main>
    <footer class="footer-container">
      <p class="footer-copyright"> <span>©</span> Copyrights 2022</p>
      <p class="footer-company-name">Blender Movies</p>
    </footer>

    <span class="chat-icon">
      <i class="fa-solid fa-comments"></i>
    </span>
  </body>
</html>
