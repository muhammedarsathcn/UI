<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shruti-Bhatt</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./scss/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- hero section starts  -->
    <section class="hero">
      <h1 class="hero__title">
        Shruthi <span class="hero__title-highlight">Bhatt</span>
      </h1>
      <h3 class="hero__role">
        a <span class="hero__role-highlight">product</span> designer
      </h3>
      <a href="mailto:shruthi.bhatt@siriuscom.com" class="hero__mailLink">
        <span class="hero__email"> shruthi.bhatt@siriuscom.com </span>
      </a>
    </section>
    <!-- hero sections ends  -->
    <!-- projects starts -->
    <section class="project">
      <figure class="project__figure">
        <img
          src="./assets/products/rawpixel-769308-unsplash.png"
          alt="project_1"
        />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/fancycrave-329196-unsplash.png"
          alt="project_2"
        />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/nadine-shaabana-1112616-unsplash.png"
          alt="project_3"
        />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/fikri-rasyid-689579-unsplash.png"
          alt="project_4"
        />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/marc-mueller-654355-unsplash.png"
          alt="project_5"
        />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/jeff-sheldon-3219-unsplash.png"
          alt="project_6"
        />
      </figure>
    </section>
    <!-- project ends  -->
    <section class="customers">
      <h2 class="customers__title">
        Big names to <span class="customers__title-highlight">show off</span>
      </h2>
    </section>
    <!-- companies section starts  -->

    <section class="companies">
      <figure class="companies__logo spotify" >
        <a href="https://www.spotify.com" target="_blank"
          ><img src="./assets/logos/logo_1.png" alt="spotify"
        /></a>
      </figure>
      <figure class="companies__logo">
        <a href="https://www.audi.in" target="_blank">
          <img src="./assets/logos/logo_3.png" alt="audi"
        /></a>
      </figure>
      <figure class="companies__logo adidas" >
        <a href="https://www.adidas.co.in" target="_blank">
          <img src="./assets/logos/logo_18.png" alt="adidas"
        /></a>
      </figure>
      <figure class="companies__logo lufthansa" >
        <a href="https://www.lufthansa.com" target="_blank">
          <img src="./assets/logos/logo_7.png" alt="lufthansa" />
        </a>
      </figure>
      <figure class="companies__logo">
        <a href="https://www.ikea.com" target="_blank">
          <img src="./assets/logos/logo_11.png" alt="ikea" />
        </a>
      </figure>
      <figure class="companies__logo">
        <a href="https://www.montblanc.com/en-us" target="_blank">
          <img src="./assets/logos/logo_2.png" alt="mont-blanc"
        /></a>
      </figure>
    </section>
    <!-- company section ends -->
    <!-- footer start  -->
    <footer class="footer">
      <div class="footer__line">
        <span class="first__line"> </span>
        <span class="second__line"></span>
      </div>

      <section class="footer__icons">
        <span class="icon__circle">
          <a href="https://www.facebook.com" target="_blank">
            <i
              class="fa-brands fa-facebook-f footer__icons-icon"
              id="Facebook"
            ></i
          ></a>
        </span>
        <span class="icon__circle">
          <a href="https://www.x.com" target="_blank"
            ><i class="fa-brands fa-twitter footer__icons-icon"></i
          ></a>
        </span>
        <span class="icon__circle">
          <a href="https://www.instagram.com" target="_blank">
            <i class="fa-brands fa-instagram footer__icons-icon"></i>
          </a>
        </span>
        <span class="icon__circle">
          <a href="https://www.dribbble.com" target="_blank">
            <i class="fa-brands fa-dribbble footer__icons-icon"></i>
          </a>
        </span>
        <span class="icon__circle">
          <a href="https://www.medium.com" target="_blank">
            <i class="fa-brands footer__icons-icon custom__icon">𝐌</i>
          </a>
        </span>
      </section>
      <section class="footer__tag">Coded with Love & Passion</section>
    </footer>
    <!-- footer ends  -->
  </body>
</html>
