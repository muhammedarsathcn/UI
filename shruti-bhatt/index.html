<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shruti-Bhatt</title>
    <link rel="icon" href="./assets/favicon.ico" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- hero section  -->
    <section class="hero">
      <h1 class="hero__title">
        Shruthi <span class="hero__title-highlight">Bhatt</span>
      </h1>
      <h3 class="hero__role">
        a <span class="hero__role-highlight">product</span> designer
      </h3>
      <span class="hero__email"> shruthi.bhatt@siriuscom.com </span>
    </section>
    <!-- projects -->
    <section class="project">
      <figure class="project__figure">
        <img src="./assets/products/rawpixel-769308-unsplash.png" alt="" />
      </figure>
      <figure class="project__figure">
        <img src="./assets/products/fancycrave-329196-unsplash.png" alt="" />
      </figure>
      <figure class="project__figure">
        <img
          src="./assets/products/nadine-shaabana-1112616-unsplash.png"
          alt=""
        />
      </figure>
      <figure class="project__figure">
        <img src="./assets/products/fikri-rasyid-689579-unsplash.png" alt="" />
      </figure>
      <figure class="project__figure">
        <img src="./assets/products/marc-mueller-654355-unsplash.png" alt="" />
      </figure>
      <figure class="project__figure">
        <img src="./assets/products/jeff-sheldon-3219-unsplash.png" alt="" />
      </figure>
    </section>
    <section class="customers">
      <h2 class="customers__title">
        Big names to <span class="customers__title-highlight">show off</span>
      </h2>
    </section>
    <section class="companies">
      <figure class="companies__logo">
        <img src="./assets/logos/logo_1.png" alt="" />
      </figure>
      <figure class="companies__logo">
        <img src="./assets/logos/logo_3.png" alt="" />
      </figure>
      <figure class="companies__logo">
        <img src="./assets/logos/logo_18.png" alt="" />
      </figure>

      <figure class="companies__logo">
        <img src="./assets/logos/logo_7.png" alt="" />
      </figure>
      <figure class="companies__logo">
        <img src="./assets/logos/logo_11.png" alt="" />
      </figure>
      <figure class="companies__logo">
        <img src="./assets/logos/logo_2.png" alt="" />
      </figure>
    </section>

    <footer class="footer">
      <div class="footer__line">
        <span class="first__line"> </span>
        <span class="second__line"></span>
      </div>

      <section class="footer__icons">
        <i class="fa-brands fa-facebook-f footer__icons-icon"></i>
        <i class="fa-brands fa-twitter footer__icons-icon"></i>
        <i class="fa-brands fa-instagram footer__icons-icon"></i>
        <i class="fa-brands fa-dribbble footer__icons-icon"></i>
        <i class="fa-brands footer__icons-icon custom_icon">M</i>
      </section>
      <section class="footer__tag">Coded with Love & Passion</section>
    </footer>
  </body>
</html>
